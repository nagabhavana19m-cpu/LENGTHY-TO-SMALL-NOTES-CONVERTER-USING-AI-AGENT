<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Notes Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#6a11cb,#2575fc);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
width:95%;
max-width:1100px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
text-align:center;
color:#2575fc;
margin-bottom:10px;
}

p{
text-align:center;
color:gray;
margin-bottom:25px;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:16px;
border-radius:10px;
border:2px solid #ddd;
resize:none;
outline:none;
}

textarea:focus{
border-color:#2575fc;
}

.buttons{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.generate{
background:#2575fc;
color:white;
}

.generate:hover{
background:#0d5ae5;
}

.clear{
background:#ff5252;
color:white;
}

.clear:hover{
background:#e53935;
}

.copy{
background:#00c853;
color:white;
}

.copy:hover{
background:#00a844;
}

.output{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#f8f9ff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 10px rgba(0,0,0,.08);
}

.card h2{
color:#2575fc;
margin-bottom:15px;
}

ul{
padding-left:20px;
}

li{
margin-bottom:10px;
}

#summary{
line-height:1.7;
}

@media(max-width:768px){

.output{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<div class="container">

<h1>📚 AI Study Notes Generator</h1>

<p>Convert lengthy notes into concise notes with key points and summary.</p>

<textarea id="notes" placeholder="Paste your lengthy study notes here..."></textarea>

<div class="buttons">

<button class="generate" onclick="generateNotes()">Generate Notes</button>

<button class="clear" onclick="clearAll()">Clear</button>

<button class="copy" onclick="copySummary()">Copy Summary</button>

</div>

<div class="output">

<div class="card">
<h2>📌 Key Points</h2>
<ul id="keyPoints"></ul>
</div>

<div class="card">
<h2>📝 Summary</h2>
<p id="summary"></p>
</div>

</div>

</div>

<script>

function generateNotes(){

const input=document.getElementById("notes").value.trim();

if(input===""){
alert("Please enter study notes.");
return;
}

const stopWords=[
"the","is","a","an","of","and","to","in","on","for","with",
"that","this","are","was","were","as","at","by","be","it",
"from","or","which","into","their","its","also"
];

const sentences=input.match(/[^.!?]+[.!?]*/g)||[];

let wordFrequency={};

const words=input.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/);

words.forEach(word=>{
if(!stopWords.includes(word) && word.length>2){
wordFrequency[word]=(wordFrequency[word]||0)+1;
}
});

let ranked=[];

sentences.forEach(sentence=>{

let score=0;

sentence.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).forEach(word=>{

if(wordFrequency[word]){
score+=wordFrequency[word];
}

});

ranked.push({sentence,score});

});

ranked.sort((a,b)=>b.score-a.score);

let summary=ranked.slice(0,3).map(x=>x.sentence.trim()).join(" ");

document.getElementById("summary").innerHTML=summary;

const list=document.getElementById("keyPoints");

list.innerHTML="";

ranked.slice(0,6).forEach(item=>{

let li=document.createElement("li");

li.textContent=item.sentence.trim();

list.appendChild(li);

});

}

function clearAll(){

document.getElementById("notes").value="";
document.getElementById("summary").innerHTML="";
document.getElementById("keyPoints").innerHTML="";

}

function copySummary(){

const text=document.getElementById("summary").innerText;

navigator.clipboard.writeText(text);

alert("Summary copied!");

}

</script>

</body>
</html>
